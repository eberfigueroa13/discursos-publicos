var auth=firebase.auth();
var db=firebase.firestore();
var CONG='conglarm13001';
var totalOps=0, doneOps=0;

function log(msg,t){
  var el=document.getElementById('log');
  el.innerHTML+='<div class="'+(t||'info')+'">'+msg+'</div>';
  el.scrollTop=el.scrollHeight;
}
function setProgress(pct){
  document.getElementById('prog').style.width=pct+'%';
}

function doLogin(){
  var p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).then(function(r){
    log('✓ Autenticado: '+r.user.email,'ok');
    document.getElementById('btn-login').disabled=true;
    document.getElementById('btn-import').disabled=false;
  }).catch(function(e){
    log('✗ Error: '+e.message,'err');
  });
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function subirDocs(col, arr){
  if(!arr||!arr.length){log('  ↳ '+col+': sin datos','warn');return;}
  var ref=db.collection('congregaciones').doc(CONG).collection(col);
  var total=arr.length;
  log('  ↳ '+col+': '+total+' documentos','info');
  for(var i=0;i<arr.length;i+=400){
    var chunk=arr.slice(i,Math.min(i+400,arr.length));
    var batch=db.batch();
    chunk.forEach(function(item){
      var docId=(item.id||db.collection('x').doc().id).toString();
      var docRef=ref.doc(docId);
      // Limpiar campos undefined
      var clean={};
      Object.keys(item).forEach(function(k){
        if(item[k]!==undefined&&item[k]!==null)clean[k]=item[k];
      });
      batch.set(docRef,clean);
    });
    await batch.commit();
    doneOps+=chunk.length;
    setProgress(Math.round(doneOps/totalOps*100));
    log('    Lote '+(Math.floor(i/400)+1)+': '+chunk.length+' docs ✓','ok');
    await sleep(200);
  }
}
